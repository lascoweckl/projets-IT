<link rel="stylesheet" href="style.css">

<style>

body{
    body{background: linear-gradient(135deg, #e6f2ff, #d4ecff);
}
    font-family: 'Orbitron', sans-serif;
}

header{
    text-align:center;
    padding:60px 20px 40px;
}

header h1{
    font-size:3.5em;
    background:linear-gradient(90deg,#00f0ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.grid{
    width:90%;
    max-width:1300px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:50px;
    padding-bottom:80px;
}

.svg-card{
    text-decoration:none;
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:25px;
    transition:0.4s ease;
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.1);
}

.svg-card:hover{
    transform:scale(1.08);
    box-shadow:0 0 40px rgba(0,240,255,0.6);
}

.svg-card svg{
    width:100%;
    height:auto;
    border-radius:15px;
    transition:0.4s ease;
}

.svg-card:hover svg{
    filter:drop-shadow(0 0 20px #ff00c8);
}

@media(max-width:900px){
    .grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<header>
<h1>Projets IT</h1>
</header>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">

<feDropShadow dx="25" dy="25" stdDeviation="0" flood-color="#444444"/>
</filter>
</defs>
<rect width="1000" height="1000" fill="#CFE8F7"/>
<rect x="150" y="150" width="700" height="700" fill="#FFFFFF" filter="url(#frameShadow1)"/>
<text x="500" y="500" text-anchor="middle" dominant-baseline="middle"
font-family="'Fredoka', 'Baloo', 'Nunito', Arial, sans-serif"
